<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400">
  <defs>
    <pattern id="paws" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <!-- Paw pad -->
      <circle cx="40" cy="44" r="8" fill="#81d4fa" opacity="0.35"/>
      <!-- Toe beans -->
      <circle cx="30" cy="34" r="4.5" fill="#81d4fa" opacity="0.35"/>
      <circle cx="40" cy="30" r="4.5" fill="#81d4fa" opacity="0.35"/>
      <circle cx="50" cy="34" r="4.5" fill="#81d4fa" opacity="0.35"/>
      <!-- Small paw rotated -->
      <circle cx="16" cy="16" r="5" fill="#ffd9e4" opacity="0.28"/>
      <circle cx="10" cy="10" r="3" fill="#ffd9e4" opacity="0.28"/>
      <circle cx="16" cy="8"  r="3" fill="#ffd9e4" opacity="0.28"/>
      <circle cx="22" cy="10" r="3" fill="#ffd9e4" opacity="0.28"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#paws)"/>
</svg>
