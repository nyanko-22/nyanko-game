    <mask id="moon-mask-2">
      <circle cx="28" cy="508" r="17" fill="white"/>
      <circle cx="20" cy="504" r="13" fill="black"/>
    </mask>
    <mask id="moon-mask-3">
      <circle cx="200" cy="836" r="14" fill="white"/>
      <circle cx="207" cy="833" r="11" fill="black"/>
    </mask>
  </defs>
  <circle cx="360" cy="198" r="20" fill="#9095c8" opacity="0.38" mask="url(#moon-mask-1)"/>
  <circle cx="28" cy="508" r="17" fill="#9095c8" opacity="0.34" mask="url(#moon-mask-2)"/>
