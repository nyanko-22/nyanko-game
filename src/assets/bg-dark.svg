<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <!--
    Dark Cosmic cat pattern: filled cat body silhouettes, paw prints, stars, moons, constellations.
    All elements in lavender on transparent background. Displayed as no-repeat/cover.
  -->

  <!-- WALKING CAT top-left, facing right (circles + paths only, explicit fill) -->
  <!-- Body: horizontal circle -->
  <circle cx="50" cy="72" r="30" fill="#9095c8" opacity="0.40"/>
  <!-- Head: smaller circle -->
  <circle cx="94" cy="52" r="20" fill="#9095c8" opacity="0.40"/>
  <!-- Left ear -->
  <path d="M 84,36 L 90,18 L 100,36 Z" fill="#9095c8" opacity="0.40"/>
  <!-- Right ear -->
  <path d="M 100,36 L 108,18 L 118,36 Z" fill="#9095c8" opacity="0.40"/>
  <!-- Tail -->
  <path d="M 22,66 Q -2,54 -6,70 Q -8,82 5,86" fill="none" stroke="#9095c8" stroke-width="8" stroke-linecap="round" opacity="0.40"/>
  <!-- Front legs -->
  <path d="M 68,98 L 66,120 Q 66,126 72,126 Q 78,126 78,120 L 76,98 Z" fill="#9095c8" opacity="0.40"/>
  <path d="M 82,98 L 80,118 Q 80,124 86,124 Q 92,124 92,118 L 90,98 Z" fill="#9095c8" opacity="0.40"/>
  <!-- Back legs -->
  <path d="M 24,94 L 22,114 Q 22,120 28,120 Q 34,120 34,114 L 32,94 Z" fill="#9095c8" opacity="0.40"/>
  <path d="M 38,96 L 36,116 Q 36,122 42,122 Q 48,122 48,116 L 46,96 Z" fill="#9095c8" opacity="0.40"/>

  <!-- WALKING CAT top-right, facing left (mirrored) -->
  <circle cx="340" cy="78" r="30" fill="#9095c8" opacity="0.36"/>
  <circle cx="296" cy="56" r="20" fill="#9095c8" opacity="0.36"/>
  <!-- Ears (mirrored) -->
  <path d="M 306,40 L 300,22 L 290,40 Z" fill="#9095c8" opacity="0.36"/>
  <path d="M 290,40 L 280,22 L 272,40 Z" fill="#9095c8" opacity="0.36"/>
  <!-- Tail (mirrored) -->
  <path d="M 368,72 Q 392,60 396,76 Q 398,88 385,92" fill="none" stroke="#9095c8" stroke-width="8" stroke-linecap="round" opacity="0.36"/>
  <!-- Front legs -->
  <path d="M 302,104 L 300,124 Q 300,130 306,130 Q 312,130 312,124 L 310,104 Z" fill="#9095c8" opacity="0.36"/>
  <path d="M 316,104 L 314,122 Q 314,128 320,128 Q 326,128 326,122 L 324,104 Z" fill="#9095c8" opacity="0.36"/>
  <!-- Back legs -->
  <path d="M 344,100 L 342,120 Q 342,126 348,126 Q 354,126 354,120 L 352,100 Z" fill="#9095c8" opacity="0.36"/>
  <path d="M 358,100 L 356,118 Q 356,124 362,124 Q 368,124 368,118 L 366,100 Z" fill="#9095c8" opacity="0.36"/>

  <!-- SITTING CAT bottom-left -->
  <!-- Body -->
  <circle cx="55" cy="800" r="32" fill="#9095c8" opacity="0.38"/>
  <!-- Head -->
  <circle cx="70" cy="760" r="22" fill="#9095c8" opacity="0.38"/>
  <!-- Ears -->
  <path d="M 60,742 L 66,722 L 74,742 Z" fill="#9095c8" opacity="0.38"/>
  <path d="M 74,742 L 82,722 L 89,742 Z" fill="#9095c8" opacity="0.38"/>
  <!-- Tail -->
  <path d="M 26,812 Q 6,830 19,842 Q 34,850 50,840" fill="none" stroke="#9095c8" stroke-width="9" stroke-linecap="round" opacity="0.38"/>

  <!-- SITTING CAT bottom-right (mirrored) -->
  <circle cx="335" cy="800" r="32" fill="#9095c8" opacity="0.34"/>
  <circle cx="320" cy="760" r="22" fill="#9095c8" opacity="0.34"/>
  <path d="M 330,742 L 324,722 L 316,742 Z" fill="#9095c8" opacity="0.34"/>
  <path d="M 316,742 L 308,722 L 300,742 Z" fill="#9095c8" opacity="0.34"/>
  <path d="M 364,812 Q 384,830 371,842 Q 356,850 340,840" fill="none" stroke="#9095c8" stroke-width="9" stroke-linecap="round" opacity="0.34"/>

  <!-- PAW PRINT — left side, mid -->
  <circle cx="28" cy="412" r="13" fill="#9095c8" opacity="0.36"/>
  <circle cx="15" cy="396" r="7" fill="#9095c8" opacity="0.36"/>
  <circle cx="24" cy="389" r="7" fill="#9095c8" opacity="0.36"/>
  <circle cx="34" cy="389" r="7" fill="#9095c8" opacity="0.36"/>
  <circle cx="43" cy="396" r="7" fill="#9095c8" opacity="0.36"/>

  <!-- PAW PRINT — right side, lower -->
  <circle cx="364" cy="658" r="12" fill="#9095c8" opacity="0.32"/>
  <circle cx="351" cy="643" r="6" fill="#9095c8" opacity="0.32"/>
  <circle cx="360" cy="636" r="6" fill="#9095c8" opacity="0.32"/>
  <circle cx="370" cy="636" r="6" fill="#9095c8" opacity="0.32"/>
  <circle cx="379" cy="643" r="6" fill="#9095c8" opacity="0.32"/>

  <!-- 4-POINTED STARS (M 0,-r L s,-s L r,0 L s,s L 0,r L -s,s L -r,0 L -s,-s Z) -->

  <!-- Large star top center -->
  <path transform="translate(195, 32)" fill="#9095c8" opacity="0.44"
    d="M 0,-12 L 4.2,-4.2 L 12,0 L 4.2,4.2 L 0,12 L -4.2,4.2 L -12,0 L -4.2,-4.2 Z"/>

  <!-- Star left mid-upper -->
  <path transform="translate(22, 275)" fill="#9095c8" opacity="0.38"
    d="M 0,-10 L 3.5,-3.5 L 10,0 L 3.5,3.5 L 0,10 L -3.5,3.5 L -10,0 L -3.5,-3.5 Z"/>

  <!-- Star right mid-upper -->
  <path transform="translate(368, 315)" fill="#9095c8" opacity="0.34"
    d="M 0,-9 L 3.2,-3.2 L 9,0 L 3.2,3.2 L 0,9 L -3.2,3.2 L -9,0 L -3.2,-3.2 Z"/>

  <!-- Star upper right area -->
  <path transform="translate(308, 140)" fill="#9095c8" opacity="0.32"
    d="M 0,-8 L 2.8,-2.8 L 8,0 L 2.8,2.8 L 0,8 L -2.8,2.8 L -8,0 L -2.8,-2.8 Z"/>

  <!-- Star upper left area -->
  <path transform="translate(78, 155)" fill="#9095c8" opacity="0.30"
    d="M 0,-7 L 2.5,-2.5 L 7,0 L 2.5,2.5 L 0,7 L -2.5,2.5 L -7,0 L -2.5,-2.5 Z"/>

  <!-- Star lower left -->
  <path transform="translate(28, 570)" fill="#9095c8" opacity="0.30"
    d="M 0,-9 L 3.2,-3.2 L 9,0 L 3.2,3.2 L 0,9 L -3.2,3.2 L -9,0 L -3.2,-3.2 Z"/>

  <!-- Star lower right -->
  <path transform="translate(362, 530)" fill="#9095c8" opacity="0.28"
    d="M 0,-8 L 2.8,-2.8 L 8,0 L 2.8,2.8 L 0,8 L -2.8,2.8 L -8,0 L -2.8,-2.8 Z"/>

  <!-- Star small mid-left -->
  <path transform="translate(15, 500)" fill="#9095c8" opacity="0.26"
    d="M 0,-6 L 2.1,-2.1 L 6,0 L 2.1,2.1 L 0,6 L -2.1,2.1 L -6,0 L -2.1,-2.1 Z"/>

  <!-- CRESCENT MOONS (two overlapping circles using clip-path approach) -->
  <!-- Upper right moon: outer circle with inner circle cut out via mask -->
  <defs>
    <mask id="moon-mask-1">
      <circle cx="360" cy="198" r="20" fill="white"/>
      <circle cx="370" cy="193" r="16" fill="black"/>
    </mask>
    <mask id="moon-mask-2">
      <circle cx="28" cy="508" r="17" fill="white"/>
      <circle cx="20" cy="504" r="13" fill="black"/>
    </mask>
    <mask id="moon-mask-3">
      <circle cx="200" cy="836" r="14" fill="white"/>
      <circle cx="207" cy="833" r="11" fill="black"/>
    </mask>
  </defs>
  <circle cx="360" cy="198" r="20" fill="#9095c8" opacity="0.38" mask="url(#moon-mask-1)"/>
  <circle cx="28" cy="508" r="17" fill="#9095c8" opacity="0.34" mask="url(#moon-mask-2)"/>
  <circle cx="200" cy="836" r="14" fill="#9095c8" opacity="0.28" mask="url(#moon-mask-3)"/>

  <!-- CONSTELLATION 1 — left side pentagon cluster -->
  <line x1="82" y1="218" x2="108" y2="196" stroke="#9095c8" stroke-width="0.9" stroke-dasharray="3,5" opacity="0.34"/>
  <line x1="108" y1="196" x2="142" y2="206" stroke="#9095c8" stroke-width="0.9" stroke-dasharray="3,5" opacity="0.34"/>
  <line x1="142" y1="206" x2="150" y2="236" stroke="#9095c8" stroke-width="0.9" stroke-dasharray="3,5" opacity="0.34"/>
  <line x1="150" y1="236" x2="126" y2="252" stroke="#9095c8" stroke-width="0.9" stroke-dasharray="3,5" opacity="0.34"/>
  <line x1="126" y1="252" x2="82" y2="218" stroke="#9095c8" stroke-width="0.9" stroke-dasharray="3,5" opacity="0.34"/>
  <circle cx="82" cy="218" r="2.8" fill="#9095c8" opacity="0.38"/>
  <circle cx="108" cy="196" r="2.8" fill="#9095c8" opacity="0.38"/>
  <circle cx="142" cy="206" r="2.8" fill="#9095c8" opacity="0.38"/>
  <circle cx="150" cy="236" r="2.8" fill="#9095c8" opacity="0.38"/>
  <circle cx="126" cy="252" r="2.8" fill="#9095c8" opacity="0.38"/>

  <!-- CONSTELLATION 2 — right side diamond -->
  <line x1="338" y1="428" x2="368" y2="408" stroke="#9095c8" stroke-width="0.9" stroke-dasharray="3,5" opacity="0.30"/>
  <line x1="368" y1="408" x2="382" y2="436" stroke="#9095c8" stroke-width="0.9" stroke-dasharray="3,5" opacity="0.30"/>
  <line x1="382" y1="436" x2="362" y2="460" stroke="#9095c8" stroke-width="0.9" stroke-dasharray="3,5" opacity="0.30"/>
  <line x1="362" y1="460" x2="336" y2="450" stroke="#9095c8" stroke-width="0.9" stroke-dasharray="3,5" opacity="0.30"/>
  <line x1="336" y1="450" x2="338" y2="428" stroke="#9095c8" stroke-width="0.9" stroke-dasharray="3,5" opacity="0.30"/>
  <circle cx="338" cy="428" r="2.5" fill="#9095c8" opacity="0.34"/>
  <circle cx="368" cy="408" r="2.5" fill="#9095c8" opacity="0.34"/>
  <circle cx="382" cy="436" r="2.5" fill="#9095c8" opacity="0.34"/>
  <circle cx="362" cy="460" r="2.5" fill="#9095c8" opacity="0.34"/>
  <circle cx="336" cy="450" r="2.5" fill="#9095c8" opacity="0.34"/>

  <!-- Scattered tiny dots -->
  <circle cx="155" cy="44" r="1.5" fill="#9095c8" opacity="0.32"/>
  <circle cx="242" cy="56" r="1.2" fill="#9095c8" opacity="0.32"/>
  <circle cx="382" cy="128" r="1.5" fill="#9095c8" opacity="0.32"/>
  <circle cx="12" cy="192" r="1.2" fill="#9095c8" opacity="0.32"/>
  <circle cx="200" cy="138" r="1.8" fill="#9095c8" opacity="0.32"/>
  <circle cx="262" cy="192" r="1.2" fill="#9095c8" opacity="0.32"/>
  <circle cx="386" cy="268" r="1.5" fill="#9095c8" opacity="0.32"/>
  <circle cx="8" cy="358" r="1.2" fill="#9095c8" opacity="0.32"/>
  <circle cx="376" cy="498" r="1.5" fill="#9095c8" opacity="0.32"/>
  <circle cx="168" cy="302" r="1.2" fill="#9095c8" opacity="0.32"/>
  <circle cx="44" cy="678" r="1.5" fill="#9095c8" opacity="0.32"/>
  <circle cx="352" cy="698" r="1.2" fill="#9095c8" opacity="0.32"/>
  <circle cx="14" cy="78" r="1.5" fill="#9095c8" opacity="0.32"/>
  <circle cx="376" cy="64" r="1.2" fill="#9095c8" opacity="0.32"/>
  <circle cx="28" cy="748" r="1.5" fill="#9095c8" opacity="0.32"/>
  <circle cx="195" cy="200" r="1.8" fill="#9095c8" opacity="0.32"/>
</svg>
