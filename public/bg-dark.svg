<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400">
  <defs>
    <pattern id="catConstellation" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
      <!-- Constellation cat face: lines connecting stars -->
      <!-- Head circle lines (drawn as arcs approximated with line segments) -->
      <circle cx="60" cy="52" r="22" fill="none" stroke="#81d4fa" stroke-width="0.5" opacity="0.08"/>
      <!-- Left ear: star-connected triangle -->
      <line x1="43" y1="33" x2="38" y2="22" stroke="#81d4fa" stroke-width="0.6" opacity="0.07"/>
      <line x1="38" y1="22" x2="53" y2="30" stroke="#81d4fa" stroke-width="0.6" opacity="0.07"/>
      <!-- Right ear -->
      <line x1="77" y1="33" x2="82" y2="22" stroke="#81d4fa" stroke-width="0.6" opacity="0.07"/>
      <line x1="82" y1="22" x2="67" y2="30" stroke="#81d4fa" stroke-width="0.6" opacity="0.07"/>
      <!-- Eyes (star dots) -->
      <circle cx="50" cy="48" r="2" fill="#81d4fa" opacity="0.18"/>
      <circle cx="70" cy="48" r="2" fill="#81d4fa" opacity="0.18"/>
      <!-- Nose -->
      <circle cx="60" cy="56" r="1.2" fill="#ffc5d8" opacity="0.15"/>
      <!-- Whisker lines -->
      <line x1="60" y1="56" x2="36" y2="54" stroke="#81d4fa" stroke-width="0.5" opacity="0.06"/>
      <line x1="60" y1="56" x2="84" y2="54" stroke="#81d4fa" stroke-width="0.5" opacity="0.06"/>
      <line x1="60" y1="57" x2="36" y2="58" stroke="#81d4fa" stroke-width="0.5" opacity="0.05"/>
      <line x1="60" y1="57" x2="84" y2="58" stroke="#81d4fa" stroke-width="0.5" opacity="0.05"/>
      <!-- Ear star points -->
      <circle cx="38" cy="22" r="1.5" fill="#81d4fa" opacity="0.22"/>
      <circle cx="82" cy="22" r="1.5" fill="#81d4fa" opacity="0.22"/>
      <circle cx="43" cy="33" r="1" fill="#81d4fa" opacity="0.15"/>
      <circle cx="77" cy="33" r="1" fill="#81d4fa" opacity="0.15"/>
      <!-- Scattered background stars -->
      <circle cx="10" cy="10" r="0.8" fill="#81d4fa" opacity="0.2"/>
      <circle cx="100" cy="15" r="1"   fill="#81d4fa" opacity="0.15"/>
      <circle cx="20"  cy="80" r="0.8" fill="#ffc5d8" opacity="0.12"/>
      <circle cx="105" cy="90" r="0.8" fill="#81d4fa" opacity="0.18"/>
      <circle cx="8"   cy="105"r="1"   fill="#81d4fa" opacity="0.12"/>
      <circle cx="115" cy="60" r="0.8" fill="#ffc5d8" opacity="0.1"/>
      <!-- Sparkle -->
      <path d="M15 50 L16 47 L17 50 L20 51 L17 52 L16 55 L15 52 L12 51 Z" fill="#81d4fa" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#catConstellation)"/>
</svg>
