<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!--
    Dark Cosmic cat pattern — matches Stitch reference image.
    Elements: geometric cat face outlines + paw prints + constellation.
    All in very low-contrast dark blue-gray on transparent background.
    Base background color comes from CSS --color-background.
  -->

  <!-- CAT FACE A — top-left, medium size, wide style -->
  <g transform="translate(68, 88)" opacity="0.28">
    <path d="M-32,22 L-32,-8 L-42,-22 L-24,-14 L0,-20 L24,-14 L42,-22 L32,-8 L32,22 Q30,34 0,34 Q-30,34 -32,22 Z"
      fill="none" stroke="#7880aa" stroke-width="1.4" stroke-linejoin="round"/>
    <!-- Left eye (closed curve) -->
    <path d="M-20,4 Q-14,0 -8,4" fill="none" stroke="#7880aa" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Right eye -->
    <path d="M8,4 Q14,0 20,4" fill="none" stroke="#7880aa" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Nose -->
    <path d="M0,12 L-3,16 L3,16 Z" fill="#7880aa" opacity="0.6"/>
    <!-- Whiskers left -->
    <line x1="-4" y1="14" x2="-28" y2="11" stroke="#7880aa" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="-4" y1="16" x2="-28" y2="18" stroke="#7880aa" stroke-width="0.8" stroke-linecap="round"/>
    <!-- Whiskers right -->
    <line x1="4" y1="14" x2="28" y2="11" stroke="#7880aa" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="4" y1="16" x2="28" y2="18" stroke="#7880aa" stroke-width="0.8" stroke-linecap="round"/>
  </g>

  <!-- CAT FACE B — top-right, squinting/sleeping style -->
  <g transform="translate(316, 72)" opacity="0.24">
    <path d="M-26,18 L-26,-6 L-34,-18 L-20,-12 L0,-16 L20,-12 L34,-18 L26,-6 L26,18 Q24,28 0,28 Q-24,28 -26,18 Z"
      fill="none" stroke="#7880aa" stroke-width="1.3" stroke-linejoin="round"/>
    <!-- Both eyes closed with longer curve -->
    <path d="M-18,2 Q-12,-2 -6,2" fill="none" stroke="#7880aa" stroke-width="1.1" stroke-linecap="round"/>
    <path d="M6,2 Q12,-2 18,2" fill="none" stroke="#7880aa" stroke-width="1.1" stroke-linecap="round"/>
    <!-- Nose dot -->
    <circle cx="0" cy="10" r="1.5" fill="#7880aa" opacity="0.6"/>
    <!-- Whiskers -->
    <line x1="-3" y1="10" x2="-22" y2="7" stroke="#7880aa" stroke-width="0.7" stroke-linecap="round"/>
    <line x1="-3" y1="12" x2="-22" y2="14" stroke="#7880aa" stroke-width="0.7" stroke-linecap="round"/>
    <line x1="3" y1="10" x2="22" y2="7" stroke="#7880aa" stroke-width="0.7" stroke-linecap="round"/>
    <line x1="3" y1="12" x2="22" y2="14" stroke="#7880aa" stroke-width="0.7" stroke-linecap="round"/>
  </g>

  <!-- CAT FACE C — right-center, no ears visible angle -->
  <g transform="translate(348, 220)" opacity="0.22">
    <path d="M-22,16 L-22,-5 L-28,-16 L-16,-10 L0,-14 L16,-10 L28,-16 L22,-5 L22,16 Q20,24 0,24 Q-20,24 -22,16 Z"
      fill="none" stroke="#7880aa" stroke-width="1.2" stroke-linejoin="round"/>
    <path d="M-14,2 Q-9,-1 -4,2" fill="none" stroke="#7880aa" stroke-width="1" stroke-linecap="round"/>
    <path d="M4,2 Q9,-1 14,2" fill="none" stroke="#7880aa" stroke-width="1" stroke-linecap="round"/>
    <circle cx="0" cy="8" r="1.2" fill="#7880aa" opacity="0.5"/>
    <line x1="-2" y1="8" x2="-18" y2="6" stroke="#7880aa" stroke-width="0.7" stroke-linecap="round"/>
    <line x1="2" y1="8" x2="18" y2="6" stroke="#7880aa" stroke-width="0.7" stroke-linecap="round"/>
  </g>

  <!-- CAT FACE D — bottom-right, large -->
  <g transform="translate(312, 340)" opacity="0.26">
    <path d="M-30,20 L-30,-7 L-38,-20 L-22,-13 L0,-18 L22,-13 L38,-20 L30,-7 L30,20 Q28,30 0,30 Q-28,30 -30,20 Z"
      fill="none" stroke="#7880aa" stroke-width="1.4" stroke-linejoin="round"/>
    <path d="M-18,3 Q-12,-1 -6,3" fill="none" stroke="#7880aa" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M6,3 Q12,-1 18,3" fill="none" stroke="#7880aa" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M0,11 L-3,15 L3,15 Z" fill="#7880aa" opacity="0.55"/>
    <line x1="-3" y1="13" x2="-26" y2="10" stroke="#7880aa" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="-3" y1="15" x2="-26" y2="17" stroke="#7880aa" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="3" y1="13" x2="26" y2="10" stroke="#7880aa" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="3" y1="15" x2="26" y2="17" stroke="#7880aa" stroke-width="0.8" stroke-linecap="round"/>
  </g>

  <!-- PAW PRINT #1 — left side -->
  <g transform="translate(42, 248)" opacity="0.30" fill="#7880aa">
    <ellipse cx="0" cy="0" rx="11" ry="9"/>
    <ellipse cx="-12" cy="-12" rx="5" ry="4"/>
    <ellipse cx="-4" cy="-15" rx="5" ry="4"/>
    <ellipse cx="5" cy="-15" rx="5" ry="4"/>
    <ellipse cx="13" cy="-12" rx="5" ry="4"/>
  </g>

  <!-- PAW PRINT #2 — bottom center -->
  <g transform="translate(178, 368)" opacity="0.26" fill="#7880aa">
    <ellipse cx="0" cy="0" rx="9" ry="7.5"/>
    <ellipse cx="-10" cy="-10" rx="4.5" ry="3.5"/>
    <ellipse cx="-3" cy="-13" rx="4.5" ry="3.5"/>
    <ellipse cx="5" cy="-13" rx="4.5" ry="3.5"/>
    <ellipse cx="11" cy="-10" rx="4.5" ry="3.5"/>
  </g>

  <!-- CONSTELLATION #1 — bottom-left pentagon/diamond shape -->
  <g opacity="0.30">
    <line x1="82" y1="310" x2="108" y2="288" stroke="#8890b8" stroke-width="0.9" stroke-dasharray="3,4"/>
    <line x1="108" y1="288" x2="138" y2="296" stroke="#8890b8" stroke-width="0.9" stroke-dasharray="3,4"/>
    <line x1="138" y1="296" x2="142" y2="326" stroke="#8890b8" stroke-width="0.9" stroke-dasharray="3,4"/>
    <line x1="142" y1="326" x2="118" y2="342" stroke="#8890b8" stroke-width="0.9" stroke-dasharray="3,4"/>
    <line x1="118" y1="342" x2="82" y2="310" stroke="#8890b8" stroke-width="0.9" stroke-dasharray="3,4"/>
    <line x1="108" y1="288" x2="116" y2="268" stroke="#8890b8" stroke-width="0.9" stroke-dasharray="3,4"/>
    <!-- Dots at vertices -->
    <circle cx="82" cy="310" r="2.5" fill="#9098c0"/>
    <circle cx="108" cy="288" r="2.5" fill="#9098c0"/>
    <circle cx="138" cy="296" r="2.5" fill="#9098c0"/>
    <circle cx="142" cy="326" r="2.5" fill="#9098c0"/>
    <circle cx="118" cy="342" r="2.5" fill="#9098c0"/>
    <circle cx="116" cy="268" r="2" fill="#9098c0"/>
  </g>

  <!-- CONSTELLATION #2 — top-center small cluster -->
  <g opacity="0.24">
    <line x1="185" y1="30" x2="202" y2="18" stroke="#8890b8" stroke-width="0.8" stroke-dasharray="2,4"/>
    <line x1="202" y1="18" x2="220" y2="28" stroke="#8890b8" stroke-width="0.8" stroke-dasharray="2,4"/>
    <line x1="202" y1="18" x2="208" y2="8" stroke="#8890b8" stroke-width="0.8" stroke-dasharray="2,4"/>
    <circle cx="185" cy="30" r="2" fill="#9098c0"/>
    <circle cx="202" cy="18" r="2" fill="#9098c0"/>
    <circle cx="220" cy="28" r="2" fill="#9098c0"/>
    <circle cx="208" cy="8" r="1.5" fill="#9098c0"/>
  </g>

  <!-- Scattered tiny star dots -->
  <g fill="#9098c0" opacity="0.28">
    <circle cx="160" cy="75" r="1.2"/>
    <circle cx="245" cy="50" r="1.0"/>
    <circle cx="380" cy="115" r="1.2"/>
    <circle cx="22" cy="175" r="1.0"/>
    <circle cx="218" cy="158" r="1.6"/>
    <circle cx="265" cy="205" r="1.0"/>
    <circle cx="385" cy="260" r="1.2"/>
    <circle cx="95" cy="390" r="1.0"/>
    <circle cx="355" cy="385" r="1.2"/>
    <circle cx="172" cy="282" r="1.0"/>
    <circle cx="62" cy="148" r="1.2"/>
    <circle cx="298" cy="148" r="1.0"/>
    <circle cx="8" cy="52" r="1.2"/>
    <circle cx="388" cy="48" r="1.0"/>
    <circle cx="22" cy="320" r="1.2"/>
    <circle cx="200" cy="200" r="1.8"/>
  </g>
</svg>
