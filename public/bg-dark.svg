<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Dark cosmic cat pattern: cat face outlines, paw prints, constellations -->
  <!-- All elements are very low-contrast on dark navy background -->

  <!-- Cat face #1 — large, top-left area (outline style with ears, eyes, whiskers) -->
  <g opacity="0.22" fill="none" stroke="#6870a0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Head outline -->
    <path d="M 42 110  L 35 80  L 50 65  L 55 75  L 75 65  L 80 75  L 95 65  L 100 80  L 93 110  Q 90 125 67 125  Q 44 125 42 110 Z"/>
    <!-- Eyes (closed curve lines) -->
    <path d="M 53 92 Q 59 88 65 92"/>
    <path d="M 70 92 Q 76 88 82 92"/>
    <!-- Nose -->
    <path d="M 65 100 L 62 105 L 68 105 Z" fill="#6870a0"/>
    <!-- Whiskers -->
    <line x1="62" y1="103" x2="42" y2="99"/>
    <line x1="62" y1="105" x2="42" y2="108"/>
    <line x1="68" y1="103" x2="88" y2="99"/>
    <line x1="68" y1="105" x2="88" y2="108"/>
  </g>

  <!-- Cat face #2 — medium, right side -->
  <g opacity="0.2" fill="none" stroke="#6870a0" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 290 70  L 284 48  L 296 36  L 300 44  L 315 36  L 319 44  L 331 36  L 335 48  L 329 70  Q 327 82 310 82  Q 292 82 290 70 Z"/>
    <path d="M 298 56 Q 303 52 308 56"/>
    <path d="M 312 56 Q 317 52 322 56"/>
    <path d="M 308 63 L 306 67 L 310 67 Z" fill="#6870a0"/>
    <line x1="306" y1="65" x2="290" y2="62"/>
    <line x1="306" y1="67" x2="290" y2="69"/>
    <line x1="310" y1="65" x2="326" y2="62"/>
    <line x1="310" y1="67" x2="326" y2="69"/>
  </g>

  <!-- Cat face #3 — large, bottom-right -->
  <g opacity="0.22" fill="none" stroke="#6870a0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 278 330  L 270 298  L 287 283  L 292 294  L 315 283  L 320 294  L 337 283  L 342 298  L 334 330  Q 331 345 306 345  Q 281 345 278 330 Z"/>
    <path d="M 288 312 Q 295 307 302 312"/>
    <path d="M 310 312 Q 317 307 324 312"/>
    <path d="M 302 321 L 299 327 L 305 327 Z" fill="#6870a0"/>
    <line x1="299" y1="324" x2="278" y2="319"/>
    <line x1="299" y1="327" x2="278" y2="330"/>
    <line x1="305" y1="324" x2="326" y2="319"/>
    <line x1="305" y1="327" x2="326" y2="330"/>
  </g>

  <!-- Cat face #4 — small, upper-right -->
  <g opacity="0.18" fill="none" stroke="#6870a0" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 340 160  L 335 142  L 344 133  L 347 140  L 357 133  L 360 140  L 369 133  L 372 142  L 367 160  Q 365 169 354 169  Q 342 169 340 160 Z"/>
    <path d="M 347 150 Q 351 147 355 150"/>
    <path d="M 358 150 Q 362 147 366 150"/>
    <line x1="353" y1="157" x2="341" y2="154"/>
    <line x1="357" y1="157" x2="369" y2="154"/>
  </g>

  <!-- Paw print #1 — left-center area -->
  <g opacity="0.23" fill="#6870a0">
    <!-- Main pad -->
    <ellipse cx="48" cy="250" rx="10" ry="8"/>
    <!-- Toe pads -->
    <ellipse cx="36" cy="238" rx="5" ry="4"/>
    <ellipse cx="45" cy="234" rx="5" ry="4"/>
    <ellipse cx="55" cy="234" rx="5" ry="4"/>
    <ellipse cx="63" cy="239" rx="5" ry="4"/>
  </g>

  <!-- Paw print #2 — bottom-center area -->
  <g opacity="0.2" fill="#6870a0">
    <ellipse cx="180" cy="370" rx="9" ry="7"/>
    <ellipse cx="169" cy="358" rx="4.5" ry="3.5"/>
    <ellipse cx="178" cy="354" rx="4.5" ry="3.5"/>
    <ellipse cx="187" cy="354" rx="4.5" ry="3.5"/>
    <ellipse cx="195" cy="359" rx="4.5" ry="3.5"/>
  </g>

  <!-- Constellation — lower-left area (dot + line pattern) -->
  <g opacity="0.25" stroke="#8890b8" stroke-width="0.8" stroke-dasharray="2,3" fill="#8890b8">
    <line x1="90" y1="310" x2="120" y2="290"/>
    <line x1="120" y1="290" x2="145" y2="300"/>
    <line x1="145" y1="300" x2="150" y2="330"/>
    <line x1="150" y1="330" x2="125" y2="345"/>
    <line x1="125" y1="345" x2="90" y2="310"/>
    <line x1="120" y1="290" x2="130" y2="270"/>
    <circle cx="90"  cy="310" r="2"/>
    <circle cx="120" cy="290" r="2"/>
    <circle cx="145" cy="300" r="2"/>
    <circle cx="150" cy="330" r="2"/>
    <circle cx="125" cy="345" r="2"/>
    <circle cx="130" cy="270" r="2"/>
  </g>

  <!-- Constellation #2 — top-center -->
  <g opacity="0.2" stroke="#8890b8" stroke-width="0.8" stroke-dasharray="2,3" fill="#8890b8">
    <line x1="180" y1="25" x2="200" y2="15"/>
    <line x1="200" y1="15" x2="218" y2="28"/>
    <line x1="200" y1="15" x2="205" y2="5"/>
    <circle cx="180" cy="25"  r="1.8"/>
    <circle cx="200" cy="15"  r="1.8"/>
    <circle cx="218" cy="28"  r="1.8"/>
    <circle cx="205" cy="5"   r="1.5"/>
  </g>

  <!-- Scattered small star dots -->
  <g fill="#8890b8" opacity="0.25">
    <circle cx="160" cy="80"  r="1.2"/>
    <circle cx="240" cy="50"  r="1"/>
    <circle cx="370" cy="100" r="1.2"/>
    <circle cx="20"  cy="180" r="1"/>
    <circle cx="220" cy="160" r="1.5"/>
    <circle cx="260" cy="210" r="1"/>
    <circle cx="380" cy="250" r="1.2"/>
    <circle cx="100" cy="390" r="1"/>
    <circle cx="350" cy="380" r="1.2"/>
    <circle cx="170" cy="280" r="1"/>
    <circle cx="70"  cy="150" r="1.2"/>
    <circle cx="290" cy="140" r="1"/>
    <circle cx="140" cy="200" r="1.5"/>
    <circle cx="320" cy="230" r="1"/>
    <circle cx="30"  cy="320" r="1.2"/>
  </g>

  <!-- Tiny glow dots (slightly brighter) -->
  <g fill="#9098c0" opacity="0.18">
    <circle cx="200" cy="200" r="2"/>
    <circle cx="260" cy="280" r="1.8"/>
    <circle cx="130" cy="140" r="1.5"/>
    <circle cx="350" cy="50"  r="1.5"/>
  </g>
</svg>
